name: Build Mod Menu APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle
        run: |
          wget https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          echo "GRADLE_HOME=$GITHUB_WORKSPACE/gradle-8.2" >> $GITHUB_ENV
          echo "$GITHUB_WORKSPACE/gradle-8.2/bin" >> $GITHUB_PATH

      - name: Build APK (Direct Gradle)
        run: |
          # First fix gradlew permissions
          chmod +x gradlew || true
          # Generate wrapper if missing
          gradle wrapper --gradle-version 8.2
          # Build the APK
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ModMenu-APK
          path: app/build/outputs/apk/release/*.apk
